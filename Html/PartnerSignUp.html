<!DOCTYPE html>

<html >
  <head>
    <meta charset="UTF-8">
    <title> Partner Registration Form | CodingLab </title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    
   </head>
<body>
  <header>
    <img src="weblogo.gif" alt="a logo for website" class="logo-small">
    <p class="webname">Lingo Fox</p>
</header>
  <div class="container">
    <div class="title"> Partner Registration</div>
    <div class="content">
      <form action="#">
        <div class="user-details">
          <div class="input-box">
            <span class="details">First Name</span>
            <input type="text" placeholder="Enter your name" required>
          </div>
          <div class="input-box">
            <span class="details">Last name</span>
            <input type="text" placeholder="Enter your username" required>
          </div>
          <div class="input-box">
            <span class="details">Email</span>
            <input type="text" placeholder="Enter your email" required>
          </div>
          <div class="input-box">
            <span class="details">Phone Number</span>
            <input type="text" placeholder="Enter your number" required>
          </div>
            <div class="input-box">
            <span class="details">Age</span>
            <input type="text" placeholder="Enter your Age" required>
          </div>
        <div class="input-box">
            <span class="details">City</span>
            <input type="text" placeholder="Enter your City" required>
          </div>
        <label for="photo">Optional Photo:</label>
        <input type="file" id="photo" name="photo" accept="image/*">
         <div class="input-box">
            <span class="details">Bio</span>
            <input type="text" placeholder="Enter a short bio including the language Spoken" required>
          </div>

          <div class="input-box">
            <span class="details">Password</span>
            <input type="text" placeholder="Enter your password" required>
          </div>
          <div class="input-box">
            <span class="details">Confirm Password</span>
            <input type="text" placeholder="Confirm your password" required>
          </div>
        </div>
        <div class="gender-details">
          <input type="radio" name="gender" id="dot-1">
          <input type="radio" name="gender" id="dot-2">
          <input type="radio" name="gender" id="dot-3">
          <span class="gender-title">Gender</span>
          <div class="category">
            <label for="dot-1">
            <span class="dot one"></span>
            <span class="gender">Male</span>
          </label>
          <label for="dot-2">
            <span class="dot two"></span>
            <span class="gender">Female</span>
          </label>
          <label for="dot-3">
            <span class="dot three"></span>
            <span class="gender">Prefer not to say</span>
            </label>
          </div>
        </div>
        <div class="button">
          <input type="submit" value="Register">
        </div>
      </form>
    </div>
  </div>
  <footer>
    <table class = "footertable">
        <thead>
            <th><a href="ContactUs.html"> Contact Us </a></th>
            <th><a href="FAQ.html"> FAQs </a></th>
            <th><a href="aboutUs.html"> About Us </a></th>
        </tr>
    </table>

               <i class="fa-brands fa-linkedin"></i>

        </div>

   
</footer>
</body>
</html>
