<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        .checked {
            color: orange;
        }
    </style>
    <title>Review and Rate</title>
</head>

<body>

    <h2>Leave a Review</h2>

    <div class="content">

        <label for="fname">First Name</label><br>
        <input type="text" id="fname" name="firstname" placeholder="Enter your first name"> <br>

        <label for="lname">Last Name</label><br>
        <input type="text" id="lname" name="lastname" placeholder="Enter your last name"><br>

        <label>Rate the session:</label>
        <span class="fa fa-star checked"></span>
        <span class="fa fa-star checked"></span>
        <span class="fa fa-star checked"></span>
        <span class="fa fa-star checked"></span>
        <span class="fa fa-star"></span>
        <br>
        <label>How was your experience?</label><br>
        <textarea placeholder="Tell us about it!"> </textarea>
        <br>

        <input type="submit" value="Submit">

    </div>
</body>

</html>
